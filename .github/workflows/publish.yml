name: Publish Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@hienfeld'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build library
        run: npm run build:lib

      - name: Verify dist contents
        run: |
          test -f dist/hienfeld-design-system.js || exit 1
          test -f dist/hienfeld-design-system.cjs || exit 1
          test -f dist/hienfeld-design-system.css || exit 1
          test -f dist/tokens.css || exit 1
          test -f dist/index.d.ts || exit 1
          echo "All expected files present in dist/"

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
